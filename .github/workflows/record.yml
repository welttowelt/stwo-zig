# Copy into .github/workflows/ alongside validate.yml.
# Records maintainer-merged claimed submissions: the human merge is the
# adjudication; this appends the optimistic ledger row and refreshes the
# committed site feed so the backend and website update within a minute or
# two — no manual promote/feed/push. Judged verdicts never pass through
# here; they arrive via the signed promote path.
name: autoresearch-record

on:
  push:
    branches: [main]
    paths:
      - "autoresearch/submissions/**"
      - "autoresearch/ledger/**"
      - "autoresearch/reference/**"
      - "autoresearch/MANIFEST.json"
      - "vectors/reports/benchmark_history/**"

permissions:
  contents: write

concurrency:
  group: autoresearch-record
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.AUTORESEARCH_PUBLISH_KEY }}
      - name: Record claimed promotions and refresh the feed
        run: |
          git config user.name "autoresearch-record[bot]"
          git config user.email "autoresearch-record[bot]@users.noreply.github.com"
          python3 autoresearch/bots/record_action.py
          git push origin main
