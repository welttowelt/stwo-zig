name: autoresearch-promote

on:
  push:
    branches: [main]
    paths:
      - "autoresearch/submissions/**"

permissions: {}

concurrency:
  group: autoresearch-promote-${{ github.repository }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out the triggering main revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          ssh-key: ${{ secrets.AUTORESEARCH_PUBLISH_KEY }}
      - name: Validate main identity and refresh queued authority
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = push
          test "$GITHUB_REF" = refs/heads/main
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          git reset --hard origin/main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
      - name: Append a signature- and board-authority-checked ledger row
        env:
          JUDGE_HMAC_SECRET: ${{ secrets.JUDGE_HMAC_SECRET }}
        run: |
          set -euo pipefail
          before=$(git rev-parse HEAD)
          git config user.name "stwo-perf-judge"
          git config user.email "judge@users.noreply.github.com"
          python3 autoresearch/bots/promote_action.py
          after=$(git rev-parse HEAD)
          if [ "$after" != "$before" ]; then
            changed=$(git diff-tree --no-commit-id --name-only -r "$after")
            test "$changed" = autoresearch/ledger/promotions.tsv
            git push origin HEAD:main
          fi
