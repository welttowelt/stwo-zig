name: Benchmark Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "17 03 * * *"
  push:
    branches: [ "main" ]
    paths: &benchmark_page_paths
      - "bench/**"
      - "vectors/reports/benchmark_history/**"
      - "scripts/benchmark_pages.py"
      - "scripts/benchmark_pages_lib/**"
      - "scripts/tests/test_benchmark_pages.py"
      - "build_support/benchmarks/native.zig"
      - ".github/workflows/benchmark-pages.yml"
  pull_request:
    paths: *benchmark_page_paths

concurrency:
  group: "benchmark-pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate:
    name: Validate benchmark publication
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    outputs:
      publish: ${{ steps.publish.outputs.publish }}
    steps:
      - name: Checkout exact source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Validate benchmark catalog and site
        run: python3 scripts/benchmark_pages.py --validate

      - name: Decide whether publication changed
        id: publish
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "schedule" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_sha="$(gh api \
            "repos/$REPOSITORY/actions/workflows/benchmark-pages.yml/runs?status=success&event=schedule&per_page=1" \
            --jq '.workflow_runs[0].head_sha // empty')"
          if [[ -z "$previous_sha" ]] || ! git cat-file -e "$previous_sha^{commit}" 2>/dev/null; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$previous_sha" HEAD -- \
            bench \
            vectors/reports/benchmark_history \
            scripts/benchmark_pages.py \
            scripts/benchmark_pages_lib \
            scripts/tests/test_benchmark_pages.py \
            build_support/benchmarks/native.zig \
            .github/workflows/benchmark-pages.yml; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish benchmark site artifact
    needs: validate
    if: github.event_name != 'pull_request' && needs.validate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout exact source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Publish immutable benchmark site
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-site-${{ github.sha }}
          path: bench/site
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy benchmark site to Pages
    needs: [ validate, publish ]
    if: vars.BENCHMARK_PAGES_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout exact source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload benchmark site
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: bench/site

      - name: Deploy benchmark site
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
