# Install as .github/workflows/audit.yml. Measurement runs without secrets on
# the designated M5 judge; signing is isolated on a hosted runner.
name: autoresearch-audit

on:
  workflow_dispatch:
    inputs:
      board:
        description: Optional exact board filter
        required: false
        type: string
      workload_class:
        description: Optional exact class filter
        required: false
        type: string
      max_items:
        description: Maximum due cells to measure sequentially
        required: true
        default: "1"
        type: string
  schedule:
    - cron: "23 3 * * *"

permissions: {}

concurrency:
  group: autoresearch-audit-${{ github.repository }}
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: [self-hosted, macOS, stwo-judge]
    timeout-minutes: 360
    permissions:
      contents: read
    outputs:
      has_due: ${{ steps.plan.outputs.has_due }}
      candidate_sha: ${{ steps.plan.outputs.candidate_sha }}
    steps:
      - name: Check out immutable main authority
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main
      - name: Require the designated M5 Max judge
        run: |
          set -euo pipefail
          system_profiler SPHardwareDataType | grep -F "Chip: Apple M5 Max"
      - name: Build deterministic due plan
        id: plan
        env:
          PYTHONPATH: ${{ github.workspace }}/autoresearch/cli
          FILTER_BOARD: ${{ inputs.board }}
          FILTER_CLASS: ${{ inputs.workload_class }}
        run: |
          set -euo pipefail
          args=(plan --repo "$GITHUB_WORKSPACE" --out "$RUNNER_TEMP/audit-plan.json")
          test -z "${FILTER_BOARD:-}" || args+=(--board "$FILTER_BOARD")
          test -z "${FILTER_CLASS:-}" || args+=(--class "$FILTER_CLASS")
          python3 -m stwo_perf.audits "${args[@]}"
          due=$(python3 -c 'import json,sys; print(len(json.load(open(sys.argv[1]))["items"]))' "$RUNNER_TEMP/audit-plan.json")
          candidate=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["source"]["candidate_commit"])' "$RUNNER_TEMP/audit-plan.json")
          test "$due" -gt 0 && echo "has_due=true" >> "$GITHUB_OUTPUT" || echo "has_due=false" >> "$GITHUB_OUTPUT"
          echo "candidate_sha=$candidate" >> "$GITHUB_OUTPUT"
      - name: Execute bounded judged audits
        if: steps.plan.outputs.has_due == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}/autoresearch/cli
          MAX_ITEMS: ${{ inputs.max_items || '1' }}
        run: |
          set -euo pipefail
          python3 -m stwo_perf.audits run \
            --repo "$GITHUB_WORKSPACE" \
            --plan "$RUNNER_TEMP/audit-plan.json" \
            --runs-dir "$RUNNER_TEMP/audit-runs" \
            --max-items "$MAX_ITEMS" \
            --out "$RUNNER_TEMP/unsigned-audit.json"
      - name: Upload secret-free audit evidence
        if: steps.plan.outputs.has_due == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: autoresearch-audit-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/audit-plan.json
            ${{ runner.temp }}/unsigned-audit.json
          if-no-files-found: error
          retention-days: 7

  sign:
    needs: evaluate
    if: needs.evaluate.outputs.has_due == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out signing authority
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.evaluate.outputs.candidate_sha }}
      - name: Download unsigned evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: autoresearch-audit-${{ github.run_id }}
          path: ${{ runner.temp }}/audit
      - name: Sign and materialize append-ready rows
        env:
          JUDGE_HMAC_SECRET: ${{ secrets.JUDGE_HMAC_SECRET }}
          PYTHONPATH: ${{ github.workspace }}/autoresearch/cli
        run: |
          set -euo pipefail
          python3 -m stwo_perf.audits finalize \
            --repo "$GITHUB_WORKSPACE" \
            --unsigned "$RUNNER_TEMP/audit/unsigned-audit.json" \
            --out "$RUNNER_TEMP/audit/signed-audit.json"
      - name: Publish immutable signed audit bundle
        run: |
          set -euo pipefail
          git config user.name "stwo-perf-audit"
          git config user.email "audit@users.noreply.github.com"
          if git fetch origin audit-verdicts:refs/remotes/origin/audit-verdicts; then
            git switch -C audit-verdicts refs/remotes/origin/audit-verdicts
          else
            git switch --orphan audit-verdicts
            git rm -rf .
          fi
          mkdir -p bundles
          cp "$RUNNER_TEMP/audit/signed-audit.json" "bundles/${GITHUB_RUN_ID}.json"
          git add "bundles/${GITHUB_RUN_ID}.json"
          git commit -m "Audit: signed Metrics v2 evidence ${GITHUB_RUN_ID}"
          git push origin HEAD:audit-verdicts
