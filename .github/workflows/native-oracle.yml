name: Native oracle bundles

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  native-oracle-producer:
    name: Native oracle producer (${{ matrix.role }})
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: linux
            runner: ubuntu-latest
          - role: macos
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - name: Checkout exact producer workflow commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Authenticate owner-dispatched producer
        env:
          GH_TOKEN: ${{ github.token }}
          ROLE: ${{ matrix.role }}
        run: |
          [[ "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$GITHUB_SHA" = "$GITHUB_WORKFLOW_SHA"
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          test "$GITHUB_REF" = refs/heads/main
          run=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")
          test "$(jq -r .path <<<"$run")" = .github/workflows/native-oracle.yml
          test "$(jq -r .head_sha <<<"$run")" = "$GITHUB_SHA"
          test "$(jq -r .repository.id <<<"$run")" = "$GITHUB_REPOSITORY_ID"
          test "$(jq -r .actor.id <<<"$run")" = "$GITHUB_REPOSITORY_OWNER_ID"
          test "$(jq -r .triggering_actor.id <<<"$run")" = "$GITHUB_REPOSITORY_OWNER_ID"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          tree=$(git rev-parse 'HEAD^{tree}')
          workflow_digest=$(shasum -a 256 .github/workflows/native-oracle.yml | cut -d' ' -f1)
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --argjson repository_id "$GITHUB_REPOSITORY_ID" \
            --arg candidate "$GITHUB_SHA" \
            --arg tree "$tree" \
            --arg workflow_sha "$GITHUB_WORKFLOW_SHA" \
            --arg workflow_definition_sha256 "$workflow_digest" \
            --arg producer_job "native-oracle-producer-$ROLE" \
            --argjson run_id "$GITHUB_RUN_ID" \
            --argjson run_attempt "$GITHUB_RUN_ATTEMPT" \
            '{
              repository: $repository,
              repository_id: $repository_id,
              candidate: $candidate,
              tree: $tree,
              workflow_sha: $workflow_sha,
              workflow_path: ".github/workflows/native-oracle.yml",
              workflow_definition_sha256: $workflow_definition_sha256,
              producer_job: $producer_job,
              run_id: $run_id,
              run_attempt: $run_attempt
            }' > "$RUNNER_TEMP/native-oracle-producer.json"

      - name: Install pinned producer-only Rust toolchain
        run: rustup toolchain install nightly-2025-07-14 --profile minimal

      - name: Build pinned Native Rust oracle once
        run: >-
          cargo +nightly-2025-07-14 build --release --locked
          --manifest-path tools/stwo-interop-rs/Cargo.toml

      - name: Build and pack content-addressed bundle
        env:
          ROLE: ${{ matrix.role }}
        run: |
          bundle="$RUNNER_TEMP/native-oracle-bundle-$ROLE"
          python3 scripts/architecture_native_oracle.py build \
            --binary tools/stwo-interop-rs/target/release/stwo-interop-rs \
            --root . \
            --output "$bundle" \
            --producer "$RUNNER_TEMP/native-oracle-producer.json" \
            --authority-root .
          python3 scripts/architecture_native_oracle.py verify \
            --bundle "$bundle" \
            --root . \
            --role "$ROLE" \
            --protected \
            --expected-producer "$RUNNER_TEMP/native-oracle-producer.json" \
            --authority-root .
          python3 scripts/architecture_native_oracle_transport.py pack \
            --bundle "$bundle" \
            --output "$RUNNER_TEMP/native-oracle-$ROLE.tar"

      - name: Publish immutable Native oracle transport
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: native-oracle-${{ matrix.role }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/native-oracle-${{ matrix.role }}.tar
          if-no-files-found: error
          retention-days: 30
