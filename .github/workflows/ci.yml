name: CI

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["aot-evidence-*"]
  workflow_dispatch:
    inputs:
      gate:
        description: Release gate to run
        type: choice
        options:
          - standard
          - strict
          - architecture
          - riscv-produce-candidate
          - riscv-produce-promoted
          - riscv-candidate
          - riscv-promoted
        default: standard
      candidate_sha:
        description: Full candidate commit SHA (RISC-V gates only)
        type: string
        default: ""
      candidate_ref:
        description: Explicit candidate source ref (RISC-V gates only)
        type: string
        default: ""
      producer_run_id:
        description: Exhaustive RISC-V anchor producer run ID (RISC-V fast gates)
        type: string
        default: ""

permissions:
  actions: read
  contents: read

jobs:
  focused-plan:
    name: Select focused PR gates
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      linux_matrix: ${{ steps.scope.outputs.linux_matrix }}
      linux_count: ${{ steps.scope.outputs.linux_count }}
      macos_matrix: ${{ steps.scope.outputs.macos_matrix }}
      macos_count: ${{ steps.scope.outputs.macos_count }}
    steps:
      - name: Checkout complete comparison history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: 0.15.2

      - name: Emit authoritative product catalog
        run: zig build product-matrix-identity -Doptimize=ReleaseFast

      - name: Select affected product lanes
        id: scope
        run: |
          python3 scripts/ci_scope_plan.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head HEAD \
            --output "$RUNNER_TEMP/focused-ci-plan.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Retain focused gate plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: focused-ci-plan-${{ github.sha }}
          path: ${{ runner.temp }}/focused-ci-plan.json
          if-no-files-found: error
          retention-days: 30

  focused-linux:
    name: Focused Linux / ${{ matrix.lane }}
    needs: focused-plan
    if: github.event_name == 'pull_request' && needs.focused-plan.outputs.linux_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.focused-plan.outputs.linux_matrix) }}
    steps:
      - name: Checkout complete policy history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: 0.15.2

      - name: Install pinned Rust oracle toolchain
        if: matrix.lane == 'native_oracle'
        run: rustup toolchain install nightly-2025-07-14 --profile minimal

      - name: Restore product-scoped compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ${{ runner.tool_cache }}/stwo-zig/focused/${{ matrix.lane }}
          key: focused-v1-${{ runner.os }}-${{ matrix.lane }}-${{ hashFiles('build.zig.zon', 'conformance/ci-touchpoints-v1.json') }}-${{ github.sha }}
          restore-keys: |
            focused-v1-${{ runner.os }}-${{ matrix.lane }}-${{ hashFiles('build.zig.zon', 'conformance/ci-touchpoints-v1.json') }}-

      - name: Run focused lane
        run: |
          mkdir -p "$RUNNER_TEMP/focused-ci"
          python3 scripts/ci_scope_run.py \
            --lane "${{ matrix.lane }}" \
            --cache-mode warm \
            --cache-root "$RUNNER_TOOL_CACHE/stwo-zig/focused/${{ matrix.lane }}" \
            --output "$RUNNER_TEMP/focused-ci/${{ matrix.lane }}.json"

      - name: Retain lane timing receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: focused-ci-linux-${{ matrix.lane }}-${{ github.sha }}
          path: ${{ runner.temp }}/focused-ci/
          if-no-files-found: error
          retention-days: 30

  focused-macos:
    name: Focused macOS / ${{ matrix.lane }}
    needs: focused-plan
    if: github.event_name == 'pull_request' && needs.focused-plan.outputs.macos_count != '0'
    runs-on: macos-14
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.focused-plan.outputs.macos_matrix) }}
    steps:
      - name: Checkout complete policy history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: 0.15.2

      - name: Require full Xcode for AOT-owned changes
        if: matrix.lane == 'metal_aot'
        run: |
          xcode-select --print-path | grep -q '^/Applications/Xcode'
          xcrun --sdk macosx --find metal
          xcrun --sdk macosx --find metallib

      - name: Restore product-scoped compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ${{ runner.tool_cache }}/stwo-zig/focused/${{ matrix.lane }}
          key: focused-v1-${{ runner.os }}-${{ matrix.lane }}-${{ hashFiles('build.zig.zon', 'conformance/ci-touchpoints-v1.json') }}-${{ github.sha }}
          restore-keys: |
            focused-v1-${{ runner.os }}-${{ matrix.lane }}-${{ hashFiles('build.zig.zon', 'conformance/ci-touchpoints-v1.json') }}-

      - name: Run focused lane
        run: |
          mkdir -p "$RUNNER_TEMP/focused-ci"
          python3 scripts/ci_scope_run.py \
            --lane "${{ matrix.lane }}" \
            --cache-mode warm \
            --cache-root "$RUNNER_TOOL_CACHE/stwo-zig/focused/${{ matrix.lane }}" \
            --output "$RUNNER_TEMP/focused-ci/${{ matrix.lane }}.json"

      - name: Retain lane timing receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: focused-ci-macos-${{ matrix.lane }}-${{ github.sha }}
          path: ${{ runner.temp }}/focused-ci/
          if-no-files-found: error
          retention-days: 30

  focused-verdict:
    name: Focused PR gates
    needs: [focused-plan, focused-linux, focused-macos]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      PLAN_RESULT: ${{ needs.focused-plan.result }}
      LINUX_RESULT: ${{ needs.focused-linux.result }}
      MACOS_RESULT: ${{ needs.focused-macos.result }}
      MACOS_COUNT: ${{ needs.focused-plan.outputs.macos_count }}
    steps:
      - name: Require every selected lane to pass
        run: |
          test "$PLAN_RESULT" = success
          test "$LINUX_RESULT" = success
          if test "$MACOS_COUNT" = 0; then
            test "$MACOS_RESULT" = skipped
          else
            test "$MACOS_RESULT" = success
          fi

  release-gate:
    name: Release gate
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
      (inputs.gate == 'standard' || inputs.gate == 'strict'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      STWO_CAIRO_RUST_ROOT: ${{ github.workspace }}/../stwo-cairo
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: 0.15.2

      - name: Install pinned Rust toolchain
        run: rustup toolchain install nightly-2025-07-14 --profile minimal

      - name: Checkout pinned stwo-cairo oracle
        env: &stwo-cairo-env
          STWO_CAIRO_REVISION: dcd5834565b7a26a27a614e353c9c60109ebc1d9
        run: &checkout-stwo-cairo |
          git init "$STWO_CAIRO_RUST_ROOT"
          git -C "$STWO_CAIRO_RUST_ROOT" remote add origin https://github.com/teddyjfpender/stwo-cairo
          git -C "$STWO_CAIRO_RUST_ROOT" fetch --depth=1 origin "$STWO_CAIRO_REVISION"
          git -C "$STWO_CAIRO_RUST_ROOT" checkout --detach FETCH_HEAD

      - name: Run shared standard CI entrypoint
        if: github.event_name != 'workflow_dispatch' || inputs.gate == 'standard'
        run: python3 scripts/ci.py

      - name: Run shared strict CI entrypoint
        if: github.event_name == 'workflow_dispatch' && inputs.gate == 'strict'
        run: python3 scripts/ci.py --strict

      - name: Retain interoperability diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: native-interop-report-${{ github.sha }}
          path: |
            vectors/reports/e2e_interop_report.json
            vectors/reports/latest_e2e_interop_report.json
            zig-out/release-evidence/native/interop-history/
          if-no-files-found: warn
          retention-days: 30

  metal-acceptance:
    name: Metal AOT reproducible build
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
      (inputs.gate == 'standard' || inputs.gate == 'strict'))
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: 0.15.2

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Require full Xcode offline Metal tools
        run: |
          xcode-select --print-path | grep -q '^/Applications/Xcode'
          xcrun --sdk macosx --find metal
          xcrun --sdk macosx --find metallib

      - name: Exercise SN-PIE composition metallib loader
        run: |
          zig build metal-eval-prepare -Doptimize=ReleaseFast
          zig build metal-eval-source -Doptimize=ReleaseFast
          mkdir -p "$RUNNER_TEMP/sn-pie-composition"
          zig-out/bin/metal-eval-source \
            vectors/cairo/sn_pie_2_composition.bin \
            "$RUNNER_TEMP/sn-pie-composition/composition.metal"
          xcrun --sdk macosx metal \
            -mmacosx-version-min=14.0 \
            -std=metal3.1 \
            -fno-fast-math \
            -Werror \
            -c "$RUNNER_TEMP/sn-pie-composition/composition.metal" \
            -o "$RUNNER_TEMP/sn-pie-composition/composition.air"
          xcrun --sdk macosx metallib \
            "$RUNNER_TEMP/sn-pie-composition/composition.air" \
            -o "$RUNNER_TEMP/sn-pie-composition/composition.metallib"
          export STWO_ZIG_COMPOSITION_METALLIB="$RUNNER_TEMP/sn-pie-composition/composition.metallib"
          STWO_ZIG_ALLOW_EXPLICIT_NO_METAL_DEVICE=1 python3 -m unittest \
            scripts.tests.test_sn_pie_composition_bundle.SnPieCompositionBundleTest.test_sn1_retarget_loads_in_zig_with_existing_metallib

      - name: Capture reproducible Full-Xcode AOT build receipt
        run: |
          zig build metal-core-aot -Doptimize=ReleaseSafe
          python3 scripts/metal_core_aot_receipt.py build \
            --builder zig-out/bin/metal-core-aot \
            --output-dir "$RUNNER_TEMP/native-metal-core-aot-acceptance" \
            --receipt-out "$RUNNER_TEMP/native-metal-core-aot-acceptance/receipt.json" \
            --commit "$GITHUB_SHA"

      - name: Retain AOT build receipt and both exact bundles
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: native-metal-core-aot-${{ github.sha }}
          path: |
            ${{ runner.temp }}/native-metal-core-aot-acceptance/receipt.json
            ${{ runner.temp }}/native-metal-core-aot-acceptance/receipt.json.sha256
            ${{ runner.temp }}/native-metal-core-aot-acceptance/build-a
            ${{ runner.temp }}/native-metal-core-aot-acceptance/build-b
          if-no-files-found: error
          retention-days: 30

      - name: Compile broader Metal test graph without execution
        run: zig build metal-check -Doptimize=ReleaseSafe

  riscv-release-evidence:
    name: RISC-V exhaustive release evidence
    if: >-
      github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' &&
      startsWith(inputs.gate, 'riscv-produce-')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: riscv-exhaustive-${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
      cancel-in-progress: false
    env:
      RISCV_CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      RISCV_CANDIDATE_REF: ${{ inputs.candidate_ref }}
      RISCV_REQUESTED_PHASE: ${{ inputs.gate == 'riscv-produce-candidate' && 'candidate' || inputs.gate == 'riscv-produce-promoted' && 'promoted' || '' }}
      TRUSTED_WORKFLOW_SHA: ${{ github.workflow_sha }}
      TRUSTED_REPOSITORY_ID: "1152389958"
      TRUSTED_OWNER_ID: "92999717"
      STARK_V_SOURCE: ${{ github.workspace }}/../stark-v
      STARK_V_REVISION: d478f783055aa0d73a93768a433a3c6c31c91d1c
      STWO_CAIRO_RUST_ROOT: ${{ github.workspace }}/../stwo-cairo
      RISCV_EVIDENCE_DIR: zig-out/release-evidence/riscv/runs/exhaustive-${{ inputs.candidate_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
      RISCV_BUNDLE_DIR: zig-out/release-evidence/riscv/bundle-${{ inputs.candidate_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Require owner-dispatched main workflow and exact candidate
        id: riscv-candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_WORKFLOW_REF" = "$GITHUB_REPOSITORY/.github/workflows/ci.yml@refs/heads/main"
          run=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")
          test "$(jq -r .repository.id <<<"$run")" = "$TRUSTED_REPOSITORY_ID"
          test "$(jq -r .event <<<"$run")" = workflow_dispatch
          test "$(jq -r .head_branch <<<"$run")" = main
          test "$(jq -r .head_sha <<<"$run")" = "$TRUSTED_WORKFLOW_SHA"
          test "$(jq -r .actor.id <<<"$run")" = "$TRUSTED_OWNER_ID"
          test "$(jq -r .triggering_actor.id <<<"$run")" = "$TRUSTED_OWNER_ID"
          [[ "$RISCV_CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RISCV_CANDIDATE_REF" == refs/heads/* ]]
          candidate=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$RISCV_CANDIDATE_SHA")
          test "$(jq -r .sha <<<"$candidate")" = "$RISCV_CANDIDATE_SHA"
          candidate_branch=${RISCV_CANDIDATE_REF#refs/heads/}
          branches=$(gh api "repos/$GITHUB_REPOSITORY/commits/$RISCV_CANDIDATE_SHA/branches-where-head?per_page=100")
          jq -e --arg branch "$candidate_branch" 'any(.[]; .name == $branch)' \
            <<<"$branches" >/dev/null
          echo "tree_oid=$(jq -r .tree.sha <<<"$candidate")" >> "$GITHUB_OUTPUT"

      - name: Checkout trusted main release policy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.TRUSTED_WORKFLOW_SHA }}
          persist-credentials: false

      - name: Capture trusted main release policy
        run: |
          cp scripts/riscv_release_policy.py "$RUNNER_TEMP/riscv_release_policy.py"
          python3 "$RUNNER_TEMP/riscv_release_policy.py" capture \
            --root . \
            --trusted-commit "$TRUSTED_WORKFLOW_SHA" \
            --output "$RUNNER_TEMP/riscv-policy-baseline.json"

      - name: Checkout exact candidate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ env.RISCV_CANDIDATE_SHA }}
          persist-credentials: false

      - name: Require candidate release policy matches trusted main
        run: |
          python3 "$RUNNER_TEMP/riscv_release_policy.py" compare \
            --root . \
            --candidate "$RISCV_CANDIDATE_SHA" \
            --baseline "$RUNNER_TEMP/riscv-policy-baseline.json" \
            --output "$RUNNER_TEMP/riscv-policy-match.json"

      - name: Detect promoted adapter
        id: riscv-release-state
        run: |
          release_state=$(sed -nE \
            's/^pub const adapter_release_gated = (true|false);$/\1/p' \
            src/products/riscv_cpu/capabilities.zig)
          case "$release_state" in
            true)
              actual=promoted
              echo 'promoted=true' >> "$GITHUB_OUTPUT"
              ;;
            false)
              actual=candidate
              echo 'promoted=false' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'RISC-V capability release state is missing or ambiguous' >&2
              exit 1
              ;;
          esac
          echo "phase=$actual" >> "$GITHUB_OUTPUT"
          if test -n "$RISCV_REQUESTED_PHASE"; then
            test "$RISCV_REQUESTED_PHASE" = "$actual" || {
              echo "requested phase does not match candidate source" >&2
              exit 1
            }
          fi

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: 0.15.2

      - name: Install pinned Rust toolchains
        run: |
          rustup toolchain install nightly-2025-07-14 --profile minimal
          rustup toolchain install nightly-2026-01-29 --profile minimal

      - name: Checkout pinned Stark-V oracle
        run: |
          git init "$STARK_V_SOURCE"
          git -C "$STARK_V_SOURCE" remote add origin https://github.com/ClementWalter/stark-v
          git -C "$STARK_V_SOURCE" fetch --depth=1 origin "$STARK_V_REVISION"
          git -C "$STARK_V_SOURCE" checkout --detach FETCH_HEAD
          git -C "$STARK_V_SOURCE" submodule update --init --recursive --depth=1

      - name: Enforce owner-dispatched cache writer scope
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$GITHUB_REPOSITORY" = teddyjfpender/stwo-zig
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          test "$GITHUB_REF" = refs/heads/main
          run=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")
          test "$(jq -r .repository.id <<<"$run")" = "$TRUSTED_REPOSITORY_ID"
          test "$(jq -r .actor.id <<<"$run")" = "$TRUSTED_OWNER_ID"
          test "$(jq -r .triggering_actor.id <<<"$run")" = "$TRUSTED_OWNER_ID"

      - name: Initialize runner-local oracle cache path
        run: echo "STWO_ZIG_RISCV_ORACLE_CACHE_DIR=$RUNNER_TOOL_CACHE/stwo-zig/riscv-oracle" >> "$GITHUB_ENV"

      - name: Compute exact Stark-V helper cache identity
        id: riscv-oracle-cache
        run: |
          key_sha256=$(python3 scripts/riscv_release_oracle.py cache-key \
            --stark-v-source "$STARK_V_SOURCE")
          echo "key_sha256=$key_sha256" >> "$GITHUB_OUTPUT"

      - name: Restore integrity-checked, trusted-writer-scoped Stark-V helper cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ${{ env.STWO_ZIG_RISCV_ORACLE_CACHE_DIR }}
          key: riscv-oracle-${{ steps.riscv-oracle-cache.outputs.key_sha256 }}

      - name: Checkout pinned stwo-cairo oracle
        env: *stwo-cairo-env
        run: *checkout-stwo-cairo

      - name: Capture trusted producer identity
        env:
          GH_TOKEN: ${{ github.token }}
          RISCV_PHASE: ${{ steps.riscv-release-state.outputs.phase }}
          RISCV_TREE_OID: ${{ steps.riscv-candidate.outputs.tree_oid }}
        run: |
          run=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")
          repository_id=$(jq -r .repository.id <<<"$run")
          test "$repository_id" = "$TRUSTED_REPOSITORY_ID"
          artifact_name="riscv-exhaustive-bundle-$RISCV_CANDIDATE_SHA-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --argjson repository_id "$repository_id" \
            --arg candidate "$RISCV_CANDIDATE_SHA" \
            --arg tree "$RISCV_TREE_OID" \
            --arg source_ref "$RISCV_CANDIDATE_REF" \
            --arg workflow_sha "$TRUSTED_WORKFLOW_SHA" \
            --arg event "$GITHUB_EVENT_NAME" \
            --argjson run_id "$GITHUB_RUN_ID" \
            --argjson run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg actor "$(jq -r .actor.login <<<"$run")" \
            --argjson actor_id "$(jq -r .actor.id <<<"$run")" \
            --arg triggering_actor "$(jq -r .triggering_actor.login <<<"$run")" \
            --argjson triggering_actor_id "$(jq -r .triggering_actor.id <<<"$run")" \
            --arg phase "$RISCV_PHASE" \
            --arg artifact_name "$artifact_name" \
            '{
              schema: "riscv-release-producer-trust-v1",
              trust_root: "repository-owner-dispatch",
              repository: {full_name: $repository, id: $repository_id},
              candidate: {
                sha: $candidate, tree_oid: $tree,
                source_repository: $repository, source_repository_id: $repository_id,
                source_ref: $source_ref
              },
              workflow: {
                path: ".github/workflows/ci.yml", repository: $repository,
                repository_id: $repository_id, ref: "refs/heads/main",
                commit_sha: $workflow_sha
              },
              workflow_base: {ref: "refs/heads/main", sha: $workflow_sha},
              event: $event,
              run: {id: $run_id, attempt: $run_attempt},
              actor: {login: $actor, id: $actor_id},
              triggering_actor: {login: $triggering_actor, id: $triggering_actor_id},
              phase: $phase,
              artifact: {name: $artifact_name, retention_days: 30}
            }' > "$RUNNER_TEMP/riscv-producer-trust.json"

      - name: Run enforcing CP-13 phase gate
        run: |
          python3 scripts/riscv_release_gate.py \
            --strict \
            --phase "${{ steps.riscv-release-state.outputs.phase }}" \
            --stark-v-source "$STARK_V_SOURCE" \
            --candidate "$RISCV_CANDIDATE_SHA" \
            --evidence-dir "$RISCV_EVIDENCE_DIR"

      - name: Pack immutable exhaustive evidence
        run: |
          python3 scripts/riscv_release_bundle.py pack \
            --candidate "$RISCV_CANDIDATE_SHA" \
            --phase "${{ steps.riscv-release-state.outputs.phase }}" \
            --trust-context "$RUNNER_TEMP/riscv-producer-trust.json" \
            --policy-context "$RUNNER_TEMP/riscv-policy-match.json" \
            --evidence-dir "$RISCV_EVIDENCE_DIR" \
            --cli zig-out/bin/stwo-zig \
            --oracle-cli "$STWO_ZIG_RISCV_ORACLE_CACHE_DIR/$(jq -r .oracle.build_cache.key_sha256 "$RISCV_EVIDENCE_DIR/oracle-receipt.json")/cp11_dump" \
            --trace-cli zig-out/bin/riscv-trace-dump \
            --output-dir "$RISCV_BUNDLE_DIR"

      - name: Publish immutable exhaustive bundle
        id: riscv-bundle-upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: riscv-exhaustive-bundle-${{ env.RISCV_CANDIDATE_SHA }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.RISCV_BUNDLE_DIR }}/
          if-no-files-found: error
          retention-days: 30

      - name: Record immutable artifact digest
        run: echo "riscv exhaustive artifact digest ${{ steps.riscv-bundle-upload.outputs.artifact-digest }}"

      - name: Retain RISC-V phase evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: riscv-${{ steps.riscv-release-state.outputs.phase }}-diagnostics-${{ env.RISCV_CANDIDATE_SHA }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            zig-out/release-evidence/riscv/
            zig-out/release-evidence/native/
            vectors/reports/e2e_interop_report.json
            vectors/reports/latest_e2e_interop_report.json
            vectors/reports/benchmark_smoke_report.json
            vectors/reports/profile_smoke_report.json
            vectors/reports/prove_checkpoints_report.json
            vectors/reports/std_shims_behavior_report.json
            vectors/reports/release_evidence.json
            vectors/reports/latest_release_evidence.json
          if-no-files-found: error
          retention-days: 30

  riscv-fast-release-gate:
    name: RISC-V fast release gate
    if: >-
      github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' &&
      (inputs.gate == 'riscv-candidate' || inputs.gate == 'riscv-promoted')
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      contents: read
    concurrency:
      group: riscv-fast-${{ inputs.candidate_sha }}-${{ inputs.producer_run_id }}
      cancel-in-progress: false
    env:
      RISCV_CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      RISCV_CANDIDATE_REF: ${{ inputs.candidate_ref }}
      RISCV_PRODUCER_RUN_ID: ${{ inputs.producer_run_id }}
      RISCV_GATE_PHASE: ${{ inputs.gate == 'riscv-candidate' && 'candidate' || 'promoted' }}
      RISCV_FAST_EVIDENCE_DIR: zig-out/release-evidence/riscv/runs/fast-${{ inputs.candidate_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
      TRUSTED_REPOSITORY_ID: "1152389958"
      TRUSTED_OWNER_ID: "92999717"
    steps:
      - name: Initialize fast runner paths
        run: |
          {
            echo "RISCV_BUNDLE_DIR=$RUNNER_TEMP/riscv-exhaustive-bundle"
            echo "RISCV_CHALLENGE_PATH=$RUNNER_TEMP/riscv-release-challenge.json"
            echo "RISCV_REPLAY_LEDGER=$RUNNER_TEMP/riscv-release-replay"
          } >> "$GITHUB_ENV"

      - name: Require owner-dispatched main workflow and exact inputs
        id: riscv-candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_WORKFLOW_REF" = "$GITHUB_REPOSITORY/.github/workflows/ci.yml@refs/heads/main"
          run=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")
          test "$(jq -r .repository.id <<<"$run")" = "$TRUSTED_REPOSITORY_ID"
          test "$(jq -r .event <<<"$run")" = workflow_dispatch
          test "$(jq -r .head_branch <<<"$run")" = main
          test "$(jq -r .actor.id <<<"$run")" = "$TRUSTED_OWNER_ID"
          test "$(jq -r .triggering_actor.id <<<"$run")" = "$TRUSTED_OWNER_ID"
          test "$(jq -r .head_sha <<<"$run")" = "$GITHUB_SHA"
          [[ "$RISCV_CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RISCV_CANDIDATE_REF" == refs/heads/* ]]
          [[ "$RISCV_PRODUCER_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          candidate=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$RISCV_CANDIDATE_SHA")
          test "$(jq -r .sha <<<"$candidate")" = "$RISCV_CANDIDATE_SHA"
          candidate_branch=${RISCV_CANDIDATE_REF#refs/heads/}
          branches=$(gh api "repos/$GITHUB_REPOSITORY/commits/$RISCV_CANDIDATE_SHA/branches-where-head?per_page=100")
          jq -e --arg branch "$candidate_branch" 'any(.[]; .name == $branch)' \
            <<<"$branches" >/dev/null
          echo "tree_oid=$(jq -r .tree.sha <<<"$candidate")" >> "$GITHUB_OUTPUT"
          echo "workflow_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Resolve producer workflow trust root
        id: riscv-producer-root
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          producer=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RISCV_PRODUCER_RUN_ID")
          test "$(jq -r .path <<<"$producer")" = .github/workflows/ci.yml
          test "$(jq -r .event <<<"$producer")" = workflow_dispatch
          test "$(jq -r .head_branch <<<"$producer")" = main
          test "$(jq -r .repository.id <<<"$producer")" = "$TRUSTED_REPOSITORY_ID"
          test "$(jq -r .actor.id <<<"$producer")" = "$TRUSTED_OWNER_ID"
          test "$(jq -r .triggering_actor.id <<<"$producer")" = "$TRUSTED_OWNER_ID"
          workflow_sha=$(jq -r .head_sha <<<"$producer")
          [[ "$workflow_sha" =~ ^[0-9a-f]{40}$ ]]
          echo "workflow_sha=$workflow_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout current trusted-main release policy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ steps.riscv-candidate.outputs.workflow_sha }}
          persist-credentials: false

      - name: Capture current trusted-main release policy
        env:
          TRUSTED_WORKFLOW_SHA: ${{ steps.riscv-candidate.outputs.workflow_sha }}
        run: |
          cp scripts/riscv_release_policy.py "$RUNNER_TEMP/riscv_release_policy.py"
          python3 "$RUNNER_TEMP/riscv_release_policy.py" capture \
            --root . \
            --trusted-commit "$TRUSTED_WORKFLOW_SHA" \
            --output "$RUNNER_TEMP/riscv-policy-baseline.json"

      - name: Checkout exact candidate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ env.RISCV_CANDIDATE_SHA }}
          persist-credentials: false

      - name: Require candidate release policy matches current trusted main
        run: |
          python3 "$RUNNER_TEMP/riscv_release_policy.py" compare \
            --root . \
            --candidate "$RISCV_CANDIDATE_SHA" \
            --baseline "$RUNNER_TEMP/riscv-policy-baseline.json" \
            --output "$RUNNER_TEMP/riscv-policy-match.json"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: 0.15.2

      - name: Restore exact-candidate Zig build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: riscv-cpu-static-v1-${{ runner.os }}-zig-0.15.2-${{ env.RISCV_CANDIDATE_SHA }}
          restore-keys: riscv-cpu-static-v1-${{ runner.os }}-zig-0.15.2-

      - name: Require requested release phase
        run: |
          release_state=$(sed -nE \
            's/^pub const adapter_release_gated = (true|false);$/\1/p' \
            src/products/riscv_cpu/capabilities.zig)
          case "$release_state" in
            true) actual=promoted ;;
            false) actual=candidate ;;
            *)
              echo 'RISC-V capability release state is missing or ambiguous' >&2
              exit 1
              ;;
          esac
          test "$actual" = "$RISCV_GATE_PHASE" || {
            echo "requested phase $RISCV_GATE_PHASE does not match source phase $actual" >&2
            exit 1
          }

      - name: Resolve reusable successful producer job and artifact
        id: riscv-producer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$RISCV_PRODUCER_RUN_ID"
          producer=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id")
          test "$(jq -r .path <<<"$producer")" = .github/workflows/ci.yml
          test "$(jq -r .head_branch <<<"$producer")" = main
          producer_event=$(jq -r .event <<<"$producer")
          test "$producer_event" = workflow_dispatch
          test "$(jq -r .repository.id <<<"$producer")" = "$TRUSTED_REPOSITORY_ID"
          test "$(jq -r .actor.id <<<"$producer")" = "$TRUSTED_OWNER_ID"
          test "$(jq -r .triggering_actor.id <<<"$producer")" = "$TRUSTED_OWNER_ID"
          printf '%s\n' "$producer" > "$RUNNER_TEMP/riscv-producer-run.json"
          run_attempt=$(jq -r .run_attempt <<<"$producer")
          jobs=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/attempts/$run_attempt/jobs?per_page=100")
          producer_job=$(jq -c \
            '[.jobs[] | select(.name == "RISC-V exhaustive release evidence" and
              .conclusion == "success")] | if length == 1 then .[0] else empty end' \
            <<<"$jobs")
          test -n "$producer_job" || {
            echo "producer job is not uniquely successful in run $run_id attempt $run_attempt" >&2
            exit 1
          }
          artifacts=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts?per_page=100")
          artifact_pattern="^riscv-exhaustive-bundle-[0-9a-f]{40}-$run_id-$run_attempt$"
          artifact=$(jq -c --arg pattern "$artifact_pattern" \
            '[.artifacts[] | select((.name | test($pattern)) and (.expired | not))] |
             if length == 1 then .[0] else empty end' <<<"$artifacts")
          test -n "$artifact" || {
            echo "producer lacks one live reusable exhaustive bundle" >&2
            exit 1
          }
          artifact_name=$(jq -r .name <<<"$artifact")
          anchor_candidate=$(sed -E \
            "s/^riscv-exhaustive-bundle-([0-9a-f]{40})-$run_id-$run_attempt$/\\1/" \
            <<<"$artifact_name")
          [[ "$anchor_candidate" =~ ^[0-9a-f]{40}$ ]]
          digest=$(jq -r .digest <<<"$artifact")
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          repository_id=$(jq -r .repository.id <<<"$producer")
          test "$repository_id" = "$TRUSTED_REPOSITORY_ID"
          workflow_sha=$(jq -r .head_sha <<<"$producer")
          [[ "$workflow_sha" =~ ^[0-9a-f]{40}$ ]]
          test "$workflow_sha" = "${{ steps.riscv-producer-root.outputs.workflow_sha }}"
          {
            echo "run_id=$run_id"
            echo "run_attempt=$run_attempt"
            echo "artifact_id=$(jq -r .id <<<"$artifact")"
            echo "artifact_digest=$digest"
            echo "artifact_created_at=$(jq -r .created_at <<<"$artifact")"
            echo "artifact_expires_at=$(jq -r .expires_at <<<"$artifact")"
            echo "producer_job_id=$(jq -r .id <<<"$producer_job")"
            echo "artifact_name=$artifact_name"
            echo "anchor_candidate=$anchor_candidate"
          } >> "$GITHUB_OUTPUT"

      - name: Download and verify exact immutable exhaustive archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          archive="$RUNNER_TEMP/riscv-exhaustive-bundle.zip"
          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/actions/artifacts/${{ steps.riscv-producer.outputs.artifact_id }}/zip" \
            > "$archive"
          actual_digest="sha256:$(shasum -a 256 "$archive" | cut -d' ' -f1)"
          test "$actual_digest" = "${{ steps.riscv-producer.outputs.artifact_digest }}"
          python3 "$RUNNER_TEMP/riscv_release_policy.py" extract \
            --archive "$archive" \
            --output "$RISCV_BUNDLE_DIR"

      - name: Bind extracted anchor to trusted producer API identity
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jq -e '.schema == "riscv-release-bundle-v3"' "$RISCV_BUNDLE_DIR/manifest.json"
          jq '.producer' "$RISCV_BUNDLE_DIR/manifest.json" > "$RUNNER_TEMP/riscv-producer-trust.json"
          trust=$(cat "$RUNNER_TEMP/riscv-producer-trust.json")
          producer=$(cat "$RUNNER_TEMP/riscv-producer-run.json")
          test "$(jq -r .repository.id <<<"$trust")" = "$TRUSTED_REPOSITORY_ID"
          test "$(jq -r .repository.full_name <<<"$trust")" = "$GITHUB_REPOSITORY"
          test "$(jq -r .candidate.sha <<<"$trust")" = "${{ steps.riscv-producer.outputs.anchor_candidate }}"
          [[ "$(jq -r .candidate.source_ref <<<"$trust")" == refs/heads/* ]]
          test "$(jq -r .candidate.source_repository_id <<<"$trust")" = "$TRUSTED_REPOSITORY_ID"
          test "$(jq -r .workflow.commit_sha <<<"$trust")" = "$(jq -r .head_sha <<<"$producer")"
          test "$(jq -r .workflow.ref <<<"$trust")" = refs/heads/main
          test "$(jq -r .workflow.path <<<"$trust")" = .github/workflows/ci.yml
          test "$(jq -r .run.id <<<"$trust")" = "${{ steps.riscv-producer.outputs.run_id }}"
          test "$(jq -r .run.attempt <<<"$trust")" = "${{ steps.riscv-producer.outputs.run_attempt }}"
          test "$(jq -r .actor.id <<<"$trust")" = "$(jq -r .actor.id <<<"$producer")"
          test "$(jq -r .triggering_actor.id <<<"$trust")" = "$(jq -r .triggering_actor.id <<<"$producer")"
          test "$(jq -r .artifact.name <<<"$trust")" = "${{ steps.riscv-producer.outputs.artifact_name }}"
          anchor=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/${{ steps.riscv-producer.outputs.anchor_candidate }}")
          test "$(jq -r .candidate.tree_oid <<<"$trust")" = "$(jq -r .tree.sha <<<"$anchor")"
          anchor_branch=$(jq -r .candidate.source_ref <<<"$trust")
          anchor_branch=${anchor_branch#refs/heads/}
          branches=$(gh api \
            "repos/$GITHUB_REPOSITORY/commits/${{ steps.riscv-producer.outputs.anchor_candidate }}/branches-where-head?per_page=100")
          jq -e --arg branch "$anchor_branch" 'any(.[]; .name == $branch)' \
            <<<"$branches" >/dev/null

      - name: Verify reusable exhaustive anchor
        run: |
          chmod 0555 \
            "$RISCV_BUNDLE_DIR/bin/stwo-zig" \
            "$RISCV_BUNDLE_DIR/bin/cp11_dump" \
            "$RISCV_BUNDLE_DIR/bin/riscv-trace-dump"
          python3 scripts/riscv_release_bundle.py verify-anchor \
            --candidate "$RISCV_CANDIDATE_SHA" \
            --workflow-sha "${{ steps.riscv-candidate.outputs.workflow_sha }}" \
            --trust-context "$RUNNER_TEMP/riscv-producer-trust.json" \
            --policy-context "$RUNNER_TEMP/riscv-policy-match.json" \
            --bundle "$RISCV_BUNDLE_DIR"

      - name: Record immutable artifact transport
        run: |
          jq -n \
            --argjson artifact_id "${{ steps.riscv-producer.outputs.artifact_id }}" \
            --arg digest "${{ steps.riscv-producer.outputs.artifact_digest }}" \
            --arg created_at "${{ steps.riscv-producer.outputs.artifact_created_at }}" \
            --arg expires_at "${{ steps.riscv-producer.outputs.artifact_expires_at }}" \
            --argjson run_id "${{ steps.riscv-producer.outputs.run_id }}" \
            --argjson run_attempt "${{ steps.riscv-producer.outputs.run_attempt }}" \
            --argjson job_id "${{ steps.riscv-producer.outputs.producer_job_id }}" \
            --arg manifest_sha256 "$(shasum -a 256 "$RISCV_BUNDLE_DIR/manifest.json" | cut -d' ' -f1)" \
            '{
              schema: "riscv-artifact-transport-v1", artifact_id: $artifact_id,
              artifact_digest: $digest, created_at: $created_at, expires_at: $expires_at,
              producer_run: {id: $run_id, attempt: $run_attempt},
              producer_job: {id: $job_id, conclusion: "success"},
              manifest_sha256: $manifest_sha256
            }' > "$RISCV_BUNDLE_DIR/artifact-transport.json"

      - name: Build focused static candidate prover and diagnostic
        run: |
          zig build stwo-zig-riscv-cpu-static \
            -Dimplementation-commit="$RISCV_CANDIDATE_SHA" \
            -Dimplementation-dirty=false
          python3 scripts/check_riscv_cpu_product.py

      - name: Exercise candidate sandbox isolation
        run: |
          zig cc \
            -target x86_64-linux-musl \
            -static \
            -O2 \
            -o "$RUNNER_TEMP/riscv-sandbox-adversary" \
            scripts/tests/fixtures/riscv_candidate_sandbox_probe.c
          python3 scripts/riscv_sandbox_adversary.py \
            --probe "$RUNNER_TEMP/riscv-sandbox-adversary"

      - name: Issue fresh server challenge
        run: |
          python3 scripts/riscv_release_challenge.py issue \
            --bundle "$RISCV_BUNDLE_DIR" \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$TRUSTED_REPOSITORY_ID" \
            --candidate "$RISCV_CANDIDATE_SHA" \
            --tree "${{ steps.riscv-candidate.outputs.tree_oid }}" \
            --phase "$RISCV_GATE_PHASE" \
            --workflow-sha "${{ steps.riscv-candidate.outputs.workflow_sha }}" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --cli zig-out/bin/stwo-zig-riscv-cpu-x86_64-linux-musl \
            --trace-cli zig-out/bin/riscv-trace-dump \
            --output "$RISCV_CHALLENGE_PATH"

      - name: Execute isolated secure challenge
        run: |
          python3 scripts/riscv_release_challenge.py execute \
            --bundle "$RISCV_BUNDLE_DIR" \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$TRUSTED_REPOSITORY_ID" \
            --candidate "$RISCV_CANDIDATE_SHA" \
            --tree "${{ steps.riscv-candidate.outputs.tree_oid }}" \
            --phase "$RISCV_GATE_PHASE" \
            --workflow-sha "${{ steps.riscv-candidate.outputs.workflow_sha }}" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --cli zig-out/bin/stwo-zig-riscv-cpu-x86_64-linux-musl \
            --trace-cli zig-out/bin/riscv-trace-dump \
            --challenge "$RISCV_CHALLENGE_PATH" \
            --evidence-dir "$RISCV_FAST_EVIDENCE_DIR" \
            --replay-ledger "$RISCV_REPLAY_LEDGER" \
            --result "$RISCV_FAST_EVIDENCE_DIR/result.json"

      - name: Enforce fast-gate receipt SLA
        run: |
          jq -e '
            .schema == "riscv-release-challenge-result-v1" and .status == "PASS" and
            .timing.wall_duration_ns <= 180000000000
          ' "$RISCV_FAST_EVIDENCE_DIR/result.json"
          cp "$RISCV_BUNDLE_DIR/artifact-transport.json" "$RISCV_FAST_EVIDENCE_DIR/"

      - name: Retain fresh challenge evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: riscv-${{ env.RISCV_GATE_PHASE }}-fast-evidence-${{ env.RISCV_CANDIDATE_SHA }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.RISCV_FAST_EVIDENCE_DIR }}/
          if-no-files-found: error
          retention-days: 30

  architecture-diagnostic:
    name: Build architecture candidate diagnostic
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.gate == 'architecture' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false
      - name: Emit explicit non-authoritative status
        run: >-
          python3 scripts/architecture_candidate_diagnostic.py
          --output "$RUNNER_TEMP/architecture-candidate-diagnostic.json"
      - name: Retain candidate diagnostic
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: build-architecture-candidate-diagnostic-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/architecture-candidate-diagnostic.json
          if-no-files-found: error
          retention-days: 7
