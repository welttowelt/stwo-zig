name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      gate:
        description: Release gate to run
        type: choice
        options:
          - standard
          - strict
        default: standard

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      STWO_CAIRO_RUST_ROOT: ${{ runner.temp }}/stwo-cairo
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Install pinned Rust toolchain
        run: rustup toolchain install nightly-2025-07-14 --profile minimal

      - name: Checkout pinned stwo-cairo oracle
        env:
          STWO_CAIRO_REVISION: dcd5834565b7a26a27a614e353c9c60109ebc1d9
        run: |
          git init "$STWO_CAIRO_RUST_ROOT"
          git -C "$STWO_CAIRO_RUST_ROOT" remote add origin https://github.com/starkware-libs/stwo-cairo.git
          git -C "$STWO_CAIRO_RUST_ROOT" fetch --depth=1 origin "$STWO_CAIRO_REVISION"
          git -C "$STWO_CAIRO_RUST_ROOT" checkout --detach FETCH_HEAD

      - name: Run shared standard CI entrypoint
        if: github.event_name != 'workflow_dispatch' || inputs.gate == 'standard'
        run: python3 scripts/ci.py

      - name: Run shared strict CI entrypoint
        if: github.event_name == 'workflow_dispatch' && inputs.gate == 'strict'
        run: python3 scripts/ci.py --strict

  metal-compile:
    name: Metal compile and link
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Compile Metal test graph without execution
        run: zig build metal-check -Doptimize=ReleaseSafe
