name: Build architecture authority

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Exact candidate commit to execute
        type: string
        required: true
      riscv_producer_run_id:
        description: Trusted exhaustive RISC-V producer run
        type: string
        required: true
      native_oracle_run_id:
        description: Trusted two-host Native oracle producer run
        type: string
        required: true

permissions:
  actions: read
  contents: read

jobs:
  architecture-authority-session:
    name: session
    runs-on: ubuntu-latest
    environment: build-architecture-authority
    timeout-minutes: 10
    env:
      ARCHITECTURE_AUTHORITY_SHA: ${{ vars.ARCHITECTURE_AUTHORITY_SHA }}
      STWO_ARCHITECTURE_DISPATCH_ACTOR_ID: ${{ github.actor_id }}
    outputs:
      nonce: ${{ steps.identity.outputs.nonce }}
      candidate_tree: ${{ steps.identity.outputs.candidate_tree }}
    steps:
      - name: Reject missing or candidate-controlled authority identity
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: |
          [[ "$ARCHITECTURE_AUTHORITY_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$ARCHITECTURE_AUTHORITY_SHA" != "$CANDIDATE_SHA"
          test "$GITHUB_WORKFLOW_SHA" = "$ARCHITECTURE_AUTHORITY_SHA"
          test "$STWO_ARCHITECTURE_DISPATCH_ACTOR_ID" = "$GITHUB_REPOSITORY_OWNER_ID"
          [[ "${{ inputs.riscv_producer_run_id }}" =~ ^[1-9][0-9]*$ ]]
          [[ "${{ inputs.native_oracle_run_id }}" =~ ^[1-9][0-9]*$ ]]

      - name: Checkout authenticated authority
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.ARCHITECTURE_AUTHORITY_SHA }}
          path: authority
          persist-credentials: false

      - name: Checkout exact candidate separately
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ inputs.candidate_sha }}
          path: candidate
          persist-credentials: false

      - name: Authenticate dispatch and issue same-run nonce
        id: identity
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          run=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")
          test "$(jq -r .path <<<"$run")" = .github/workflows/architecture-authority.yml
          test "$(jq -r .event <<<"$run")" = workflow_dispatch
          test "$(jq -r .head_branch <<<"$run")" = main
          test "$(jq -r .head_sha <<<"$run")" = "$ARCHITECTURE_AUTHORITY_SHA"
          test "$(jq -r .repository.id <<<"$run")" = "$GITHUB_REPOSITORY_ID"
          test "$(jq -r .actor.id <<<"$run")" = "$GITHUB_REPOSITORY_OWNER_ID"
          test "$(jq -r .triggering_actor.id <<<"$run")" = "$GITHUB_REPOSITORY_OWNER_ID"
          python3 authority/scripts/architecture_external_authority.py validate-contract \
            --candidate-root candidate \
            --candidate "$CANDIDATE_SHA" \
            --expected-job architecture-authority-session
          echo "candidate_tree=$(git -C candidate rev-parse 'HEAD^{tree}')" >> "$GITHUB_OUTPUT"
          echo "nonce=$(openssl rand -hex 32)" >> "$GITHUB_OUTPUT"

  architecture-authority-linux:
    name: linux
    needs: architecture-authority-session
    runs-on: ubuntu-latest
    environment: build-architecture-authority
    timeout-minutes: 60
    outputs:
      artifact_name: ${{ steps.host.outputs.artifact_name }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
    env:
      ARCHITECTURE_AUTHORITY_SHA: ${{ vars.ARCHITECTURE_AUTHORITY_SHA }}
      STWO_ARCHITECTURE_DISPATCH_ACTOR_ID: ${{ github.actor_id }}
      CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      STWO_ARCHITECTURE_SESSION_NONCE: ${{ needs.architecture-authority-session.outputs.nonce }}
      NATIVE_ORACLE_RUN_ID: ${{ inputs.native_oracle_run_id }}
      RISCV_PRODUCER_RUN_ID: ${{ inputs.riscv_producer_run_id }}
    steps:
      - name: Checkout authenticated authority
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.ARCHITECTURE_AUTHORITY_SHA }}
          path: authority
          persist-credentials: false
      - name: Checkout exact candidate separately
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ inputs.candidate_sha }}
          path: candidate
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"
      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: 0.15.2

      - name: Select and unpack trusted Native oracle bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$NATIVE_ORACLE_RUN_ID" > "$RUNNER_TEMP/native-run.json"
          attempt=$(jq -r .run_attempt "$RUNNER_TEMP/native-run.json")
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$NATIVE_ORACLE_RUN_ID/attempts/$attempt/jobs?per_page=100" > "$RUNNER_TEMP/native-jobs.json"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$NATIVE_ORACLE_RUN_ID/artifacts?per_page=100" > "$RUNNER_TEMP/native-artifacts.json"
          python3 authority/scripts/architecture_native_oracle_selection.py \
            --role linux \
            --run "$RUNNER_TEMP/native-run.json" \
            --jobs "$RUNNER_TEMP/native-jobs.json" \
            --artifacts "$RUNNER_TEMP/native-artifacts.json" \
            --authority-commit "$ARCHITECTURE_AUTHORITY_SHA" \
            --authority-root authority \
            --output "$RUNNER_TEMP/native-selection.json"
          jq '.producer' "$RUNNER_TEMP/native-selection.json" > "$RUNNER_TEMP/native-producer.json"
          artifact_id=$(jq -r .artifact_id "$RUNNER_TEMP/native-selection.json")
          digest=$(jq -r .artifact_digest "$RUNNER_TEMP/native-selection.json")
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" > "$RUNNER_TEMP/native.zip"
          python3 authority/scripts/architecture_ci_artifact.py extract-oracle-tar \
            --archive "$RUNNER_TEMP/native.zip" \
            --output-dir "$RUNNER_TEMP/native-transport" \
            --member native-oracle-linux.tar \
            --digest "$digest"
          python3 authority/scripts/architecture_native_oracle_transport.py extract \
            --archive "$RUNNER_TEMP/native-transport/native-oracle-linux.tar" \
            --output "$RUNNER_TEMP/native-oracle"

      - name: Select and unpack trusted exhaustive RISC-V anchor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RISCV_PRODUCER_RUN_ID" > "$RUNNER_TEMP/riscv-run.json"
          attempt=$(jq -r .run_attempt "$RUNNER_TEMP/riscv-run.json")
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RISCV_PRODUCER_RUN_ID/attempts/$attempt/jobs?per_page=100" > "$RUNNER_TEMP/riscv-jobs.json"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RISCV_PRODUCER_RUN_ID/artifacts?per_page=100" > "$RUNNER_TEMP/riscv-artifacts.json"
          python3 authority/scripts/architecture_riscv_anchor_selection.py select \
            --run "$RUNNER_TEMP/riscv-run.json" \
            --jobs "$RUNNER_TEMP/riscv-jobs.json" \
            --artifacts "$RUNNER_TEMP/riscv-artifacts.json" \
            --authority-commit "$ARCHITECTURE_AUTHORITY_SHA" \
            --output "$RUNNER_TEMP/riscv-selection.json"
          expected_digest=$(jq -r .artifact_digest "$RUNNER_TEMP/riscv-selection.json")
          artifact_id=$(jq -r .artifact_id "$RUNNER_TEMP/riscv-selection.json")
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" > "$RUNNER_TEMP/riscv.zip"
          test "sha256:$(shasum -a 256 "$RUNNER_TEMP/riscv.zip" | cut -d' ' -f1)" = "$expected_digest"
          python3 authority/scripts/architecture_authority_dispatch.py \
            --candidate-root candidate \
            --script scripts/riscv_release_policy.py -- extract \
            --archive "$RUNNER_TEMP/riscv.zip" \
            --output "$RUNNER_TEMP/riscv-bundle"
          anchor=$(jq -r .anchor_candidate "$RUNNER_TEMP/riscv-selection.json")
          gh api "repos/$GITHUB_REPOSITORY/git/commits/$anchor" > "$RUNNER_TEMP/riscv-commit.json"
          gh api "repos/$GITHUB_REPOSITORY/commits/$anchor/branches-where-head?per_page=100" > "$RUNNER_TEMP/riscv-branches.json"
          python3 authority/scripts/architecture_riscv_anchor_selection.py bind \
            --run "$RUNNER_TEMP/riscv-run.json" \
            --jobs "$RUNNER_TEMP/riscv-jobs.json" \
            --artifacts "$RUNNER_TEMP/riscv-artifacts.json" \
            --authority-commit "$ARCHITECTURE_AUTHORITY_SHA" \
            --selection "$RUNNER_TEMP/riscv-selection.json" \
            --commit "$RUNNER_TEMP/riscv-commit.json" \
            --branches "$RUNNER_TEMP/riscv-branches.json" \
            --manifest "$RUNNER_TEMP/riscv-bundle/manifest.json" \
            --release-phase "$(jq -r .phase "$RUNNER_TEMP/riscv-bundle/manifest.json")" \
            --output "$RUNNER_TEMP/riscv-producer.json"

      - name: Capture authority-owned RISC-V release policy
        run: |
          python3 authority/scripts/architecture_authority_dispatch.py \
            --candidate-root candidate \
            --script scripts/riscv_release_policy.py -- capture \
            --root authority \
            --trusted-commit "$ARCHITECTURE_AUTHORITY_SHA" \
            --output "$RUNNER_TEMP/riscv-policy-baseline.json"
          python3 authority/scripts/architecture_authority_dispatch.py \
            --candidate-root candidate \
            --script scripts/riscv_release_policy.py -- compare \
            --root candidate \
            --candidate "$CANDIDATE_SHA" \
            --baseline "$RUNNER_TEMP/riscv-policy-baseline.json" \
            --output "$RUNNER_TEMP/riscv-policy-match.json"

      - name: Execute exact authority plan against candidate
        id: host
        run: |
          if grep -q 'pub const RISCV_ADAPTER_RELEASE_GATED = true;' candidate/src/tools/prove/registry.zig; then
            riscv_phase=promoted
          else
            riscv_phase=candidate
          fi
          evidence="$GITHUB_WORKSPACE/candidate/zig-out/release-evidence/architecture-authority/linux-$GITHUB_RUN_ID"
          receipts="$RUNNER_TEMP/receipts"
          python3 authority/scripts/architecture_external_authority.py run-host \
            --role linux \
            --candidate-root candidate \
            --candidate "$CANDIDATE_SHA" \
            --output-dir "$evidence" \
            --receipt-root "$receipts" \
            --session-nonce "$STWO_ARCHITECTURE_SESSION_NONCE" \
            --riscv-bundle "$RUNNER_TEMP/riscv-bundle" \
            --native-oracle-bundle "$RUNNER_TEMP/native-oracle" \
            --native-oracle-trust "$RUNNER_TEMP/native-producer.json" \
            --riscv-trust-context "$RUNNER_TEMP/riscv-producer.json" \
            --riscv-policy-context "$RUNNER_TEMP/riscv-policy-match.json" \
            --riscv-phase "$riscv_phase"
          mkdir "$RUNNER_TEMP/host-artifact"
          cp "$receipts/$CANDIDATE_SHA/linux/$GITHUB_RUN_ID.json" "$RUNNER_TEMP/host-artifact/receipt.json"
          cp "$evidence/linux-$GITHUB_RUN_ID-preimages.zip" "$RUNNER_TEMP/host-artifact/preimages.zip"
          echo "artifact_name=build-architecture-linux-$CANDIDATE_SHA-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - name: Upload exact Linux authority evidence
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ steps.host.outputs.artifact_name }}
          path: ${{ runner.temp }}/host-artifact/
          if-no-files-found: error
          retention-days: 30

  architecture-authority-macos:
    name: macos
    needs: architecture-authority-session
    runs-on: macos-14
    environment: build-architecture-authority
    timeout-minutes: 90
    outputs:
      artifact_name: ${{ steps.host.outputs.artifact_name }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
    env:
      ARCHITECTURE_AUTHORITY_SHA: ${{ vars.ARCHITECTURE_AUTHORITY_SHA }}
      STWO_ARCHITECTURE_DISPATCH_ACTOR_ID: ${{ github.actor_id }}
      CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      STWO_ARCHITECTURE_SESSION_NONCE: ${{ needs.architecture-authority-session.outputs.nonce }}
      NATIVE_ORACLE_RUN_ID: ${{ inputs.native_oracle_run_id }}
    steps:
      - name: Checkout authenticated authority
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.ARCHITECTURE_AUTHORITY_SHA }}
          path: authority
          persist-credentials: false
      - name: Checkout exact candidate separately
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ inputs.candidate_sha }}
          path: candidate
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"
      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: 0.15.2
      - name: Require full Xcode Metal toolchain
        run: |
          xcode-select --print-path | grep -q '^/Applications/Xcode'
          xcrun --sdk macosx --find metal
          xcrun --sdk macosx --find metallib

      - name: Select and unpack trusted Native oracle bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$NATIVE_ORACLE_RUN_ID" > "$RUNNER_TEMP/native-run.json"
          attempt=$(jq -r .run_attempt "$RUNNER_TEMP/native-run.json")
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$NATIVE_ORACLE_RUN_ID/attempts/$attempt/jobs?per_page=100" > "$RUNNER_TEMP/native-jobs.json"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$NATIVE_ORACLE_RUN_ID/artifacts?per_page=100" > "$RUNNER_TEMP/native-artifacts.json"
          python3 authority/scripts/architecture_native_oracle_selection.py \
            --role macos \
            --run "$RUNNER_TEMP/native-run.json" \
            --jobs "$RUNNER_TEMP/native-jobs.json" \
            --artifacts "$RUNNER_TEMP/native-artifacts.json" \
            --authority-commit "$ARCHITECTURE_AUTHORITY_SHA" \
            --authority-root authority \
            --output "$RUNNER_TEMP/native-selection.json"
          jq '.producer' "$RUNNER_TEMP/native-selection.json" > "$RUNNER_TEMP/native-producer.json"
          artifact_id=$(jq -r .artifact_id "$RUNNER_TEMP/native-selection.json")
          digest=$(jq -r .artifact_digest "$RUNNER_TEMP/native-selection.json")
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" > "$RUNNER_TEMP/native.zip"
          python3 authority/scripts/architecture_ci_artifact.py extract-oracle-tar \
            --archive "$RUNNER_TEMP/native.zip" \
            --output-dir "$RUNNER_TEMP/native-transport" \
            --member native-oracle-macos.tar \
            --digest "$digest"
          python3 authority/scripts/architecture_native_oracle_transport.py extract \
            --archive "$RUNNER_TEMP/native-transport/native-oracle-macos.tar" \
            --output "$RUNNER_TEMP/native-oracle"
          printf '{}\n' > "$RUNNER_TEMP/unused-riscv-trust.json"
          printf '{}\n' > "$RUNNER_TEMP/unused-riscv-policy.json"

      - name: Execute exact authority plan against candidate
        id: host
        run: |
          evidence="$GITHUB_WORKSPACE/candidate/zig-out/release-evidence/architecture-authority/macos-$GITHUB_RUN_ID"
          receipts="$RUNNER_TEMP/receipts"
          python3 authority/scripts/architecture_external_authority.py run-host \
            --role macos \
            --candidate-root candidate \
            --candidate "$CANDIDATE_SHA" \
            --output-dir "$evidence" \
            --receipt-root "$receipts" \
            --session-nonce "$STWO_ARCHITECTURE_SESSION_NONCE" \
            --riscv-bundle "$RUNNER_TEMP/unused-riscv" \
            --native-oracle-bundle "$RUNNER_TEMP/native-oracle" \
            --native-oracle-trust "$RUNNER_TEMP/native-producer.json" \
            --riscv-trust-context "$RUNNER_TEMP/unused-riscv-trust.json" \
            --riscv-policy-context "$RUNNER_TEMP/unused-riscv-policy.json" \
            --riscv-phase candidate
          mkdir "$RUNNER_TEMP/host-artifact"
          cp "$receipts/$CANDIDATE_SHA/macos/$GITHUB_RUN_ID.json" "$RUNNER_TEMP/host-artifact/receipt.json"
          cp "$evidence/macos-$GITHUB_RUN_ID-preimages.zip" "$RUNNER_TEMP/host-artifact/preimages.zip"
          echo "artifact_name=build-architecture-macos-$CANDIDATE_SHA-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - name: Upload exact macOS authority evidence
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ steps.host.outputs.artifact_name }}
          path: ${{ runner.temp }}/host-artifact/
          if-no-files-found: error
          retention-days: 30

  architecture-authority-verify:
    name: verify
    needs:
      - architecture-authority-session
      - architecture-authority-linux
      - architecture-authority-macos
    runs-on: ubuntu-latest
    environment: build-architecture-authority
    timeout-minutes: 15
    env:
      ARCHITECTURE_AUTHORITY_SHA: ${{ vars.ARCHITECTURE_AUTHORITY_SHA }}
      STWO_ARCHITECTURE_DISPATCH_ACTOR_ID: ${{ github.actor_id }}
      CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      STWO_ARCHITECTURE_SESSION_NONCE: ${{ needs.architecture-authority-session.outputs.nonce }}
    steps:
      - name: Checkout authenticated authority
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.ARCHITECTURE_AUTHORITY_SHA }}
          path: authority
          persist-credentials: false
      - name: Checkout exact candidate separately
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ inputs.candidate_sha }}
          path: candidate
          persist-credentials: false
      - name: Fetch exact same-run host artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          LINUX_NAME: ${{ needs.architecture-authority-linux.outputs.artifact_name }}
          LINUX_DIGEST: ${{ needs.architecture-authority-linux.outputs.artifact_digest }}
          MACOS_NAME: ${{ needs.architecture-authority-macos.outputs.artifact_name }}
          MACOS_DIGEST: ${{ needs.architecture-authority-macos.outputs.artifact_digest }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100" > "$RUNNER_TEMP/artifacts.json"
          for role in linux macos; do
            upper=$(printf '%s' "$role" | tr '[:lower:]' '[:upper:]')
            eval "name=\${${upper}_NAME}"
            eval "digest=\${${upper}_DIGEST}"
            [[ "$digest" == sha256:* ]] || digest="sha256:$digest"
            python3 authority/scripts/architecture_ci_artifact.py select \
              --metadata "$RUNNER_TEMP/artifacts.json" \
              --name "$name" \
              --run-id "$GITHUB_RUN_ID" \
              --digest "$digest" > "$RUNNER_TEMP/$role-selection.json"
            artifact_id=$(jq -r .artifact_id "$RUNNER_TEMP/$role-selection.json")
            gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" > "$RUNNER_TEMP/$role.zip"
            python3 authority/scripts/architecture_ci_artifact.py extract-host \
              --archive "$RUNNER_TEMP/$role.zip" \
              --output-dir "$RUNNER_TEMP/$role" \
              --digest "$digest"
            mkdir -p "$RUNNER_TEMP/receipts/$CANDIDATE_SHA/$role"
            cp "$RUNNER_TEMP/$role/receipt.json" "$RUNNER_TEMP/receipts/$CANDIDATE_SHA/$role/$GITHUB_RUN_ID.json"
          done

      - name: Derive sole BG-15 authority verdict
        run: |
          python3 authority/scripts/architecture_external_authority.py verify \
            --candidate-root candidate \
            --candidate "$CANDIDATE_SHA" \
            --session-nonce "$STWO_ARCHITECTURE_SESSION_NONCE" \
            --linux-receipt "$RUNNER_TEMP/receipts/$CANDIDATE_SHA/linux/$GITHUB_RUN_ID.json" \
            --macos-receipt "$RUNNER_TEMP/receipts/$CANDIDATE_SHA/macos/$GITHUB_RUN_ID.json" \
            --linux-preimages "$RUNNER_TEMP/linux/preimages.zip" \
            --macos-preimages "$RUNNER_TEMP/macos/preimages.zip" \
            --output-root "$GITHUB_WORKSPACE/authority/zig-out/release-evidence/build-architecture"

      - name: Retain aggregate receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: build-architecture-authority-verdict-${{ inputs.candidate_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: authority/zig-out/release-evidence/build-architecture/${{ inputs.candidate_sha }}/receipt.json
          if-no-files-found: error
          retention-days: 90
