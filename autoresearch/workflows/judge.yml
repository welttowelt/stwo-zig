# Install as .github/workflows/judge.yml. Candidate execution is isolated from
# the signing secret and write token by the evaluate/publish job boundary.
name: autoresearch-judge

on:
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize]
    branches: [main]

permissions: {}

concurrency:
  group: autoresearch-judge-${{ github.repository }}
  cancel-in-progress: false

jobs:
  evaluate:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'submission') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
      github.event.pull_request.author_association)
    runs-on: [self-hosted, macOS, stwo-judge]
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      CANDIDATE_SHA: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Check out trusted base authority
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
          path: authority
      - name: Check out immutable candidate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
      - name: Validate event identity and locked paths
        working-directory: candidate
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = pull_request
          test "$GITHUB_REF" = "refs/pull/${PR_NUMBER}/merge"
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
          git cat-file -e "${BASE_SHA}^{commit}"
          python3 "$GITHUB_WORKSPACE/authority/scripts/autoresearch_workflow_policy.py" inspect \
            --repo "$GITHUB_WORKSPACE/candidate" \
            --authority-root "$GITHUB_WORKSPACE/authority" \
            --base "$BASE_SHA" \
            --candidate "$CANDIDATE_SHA" \
            --out "$RUNNER_TEMP/preflight.json"
          BASE_REF="$BASE_SHA" PR_LABELS=submission \
            python3 "$GITHUB_WORKSPACE/authority/autoresearch/bots/validate_action.py"
      - name: Evaluate with no promotion authority
        working-directory: candidate
        env:
          JUDGE_HMAC_SECRET: NON_AUTHORITATIVE_EVALUATION_SENTINEL
        run: >-
          python3
          "$GITHUB_WORKSPACE/authority/autoresearch/bots/judge_action.py"
      - name: Stage unsigned evidence
        run: |
          set -euo pipefail
          submission_id=$(python3 -c \
            'import json,sys; print(json.load(open(sys.argv[1]))["submission_id"])' \
            "$RUNNER_TEMP/preflight.json")
          test -f "$GITHUB_WORKSPACE/candidate/judge-out/${submission_id}.json"
          cp "$GITHUB_WORKSPACE/candidate/judge-out/${submission_id}.json" \
            "$RUNNER_TEMP/unsigned-verdict.json"
      - name: Upload unsigned judge evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: autoresearch-judge-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: |
            ${{ runner.temp }}/preflight.json
            ${{ runner.temp }}/unsigned-verdict.json
          if-no-files-found: error
          retention-days: 1

  publish:
    name: autoresearch-publish
    needs: evaluate
    if: needs.evaluate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      CANDIDATE_SHA: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Check out trusted base authority
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.sha }}
          path: authority
      - name: Download unsigned judge evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: autoresearch-judge-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/judge-evidence
      - name: Revalidate immutable candidate and evidence binding
        working-directory: authority
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = pull_request
          test "$GITHUB_REF" = "refs/pull/${PR_NUMBER}/merge"
          test "$(git rev-parse HEAD)" = "$BASE_SHA"
          git fetch --no-tags origin "$CANDIDATE_SHA"
          python3 scripts/autoresearch_workflow_policy.py verify \
            --repo "$GITHUB_WORKSPACE/authority" \
            --authority-root "$GITHUB_WORKSPACE/authority" \
            --base "$BASE_SHA" \
            --candidate "$CANDIDATE_SHA" \
            --receipt "$RUNNER_TEMP/judge-evidence/preflight.json"
      - name: Sign the identity-bound verdict
        working-directory: authority
        env:
          JUDGE_HMAC_SECRET: ${{ secrets.JUDGE_HMAC_SECRET }}
        run: >-
          python3 scripts/autoresearch_workflow_policy.py finalize
          --unsigned "$RUNNER_TEMP/judge-evidence/unsigned-verdict.json"
          --receipt "$RUNNER_TEMP/judge-evidence/preflight.json"
          --out "$RUNNER_TEMP/signed-verdict.json"
      - name: Publish to the judge-only branch
        working-directory: authority
        run: |
          set -euo pipefail
          submission_id=$(python3 -c \
            'import json,sys; print(json.load(open(sys.argv[1]))["submission_id"])' \
            "$RUNNER_TEMP/signed-verdict.json")
          git config user.name "stwo-perf-judge"
          git config user.email "judge@users.noreply.github.com"
          if git fetch origin judge-verdicts:refs/remotes/origin/judge-verdicts; then
            git switch -C judge-verdicts refs/remotes/origin/judge-verdicts
          else
            git switch --orphan judge-verdicts
          fi
          mkdir -p verdicts
          cp "$RUNNER_TEMP/signed-verdict.json" "verdicts/${submission_id}.json"
          git add "verdicts/${submission_id}.json"
          git diff --cached --quiet || git commit -m "Judge: signed verdict for ${submission_id}"
          git push origin HEAD:judge-verdicts
      - name: Gate the judged outcome
        run: |
          python3 - "$RUNNER_TEMP/signed-verdict.json" <<'PY'
          import json
          import sys

          verdict = json.load(open(sys.argv[1], encoding="utf-8"))
          gates = verdict.get("gates")
          score = verdict.get("score")
          if not isinstance(gates, dict) or not isinstance(score, dict):
              raise SystemExit("signed verdict is missing gates or score")
          gates_ok = bool(gates) and all(
              isinstance(gate, dict) and gate.get("pass") is True
              for gate in gates.values()
          )
          accepted = score.get("significant") is True or score.get("neutral") is True
          raise SystemExit(0 if gates_ok and accepted else 1)
          PY

  required:
    name: autoresearch-judge
    needs: [evaluate, publish]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Enforce the required-check result
        env:
          IS_SUBMISSION: ${{ contains(github.event.pull_request.labels.*.name, 'submission') }}
          EVALUATE_RESULT: ${{ needs.evaluate.result }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
        run: |
          set -euo pipefail
          if [[ "$IS_SUBMISSION" != "true" ]]; then
            echo "ordinary PR: autoresearch evaluation not required"
            exit 0
          fi
          if [[ "$EVALUATE_RESULT" != "success" ]]; then
            echo "submission evaluation did not succeed: $EVALUATE_RESULT" >&2
            exit 1
          fi
          if [[ "$PUBLISH_RESULT" != "success" ]]; then
            echo "submission verdict publication did not succeed: $PUBLISH_RESULT" >&2
            exit 1
          fi
