# Optional alternative to the always-on backend/worker.py daemon. It spends no
# hosted-runner minutes: the persistent stwo-judge host owns the queue store.
name: autoresearch-remote-queue

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: stwo-remote-queue
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  drain-one:
    runs-on: [self-hosted, macOS, stwo-judge]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Intake, judge, and promote one eligible submission
        env:
          JUDGE_HMAC_SECRET: ${{ secrets.JUDGE_HMAC_SECRET }}
          JUDGE_HOLDOUT_SECRET: ${{ secrets.JUDGE_HOLDOUT_SECRET }}
          STWO_PERF_STORE_PATH: ${{ vars.AUTORESEARCH_STORE_PATH }}
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 autoresearch/backend/worker.py
          --repo . --store "$STWO_PERF_STORE_PATH" --once
          --push-remote origin --branch main
