name: Metal calibration

on:
  workflow_dispatch:
  schedule:
    - cron: "23 04 * * 1"

permissions:
  contents: read

concurrency:
  group: m5-metal-calibration
  cancel-in-progress: false

jobs:
  calibrate:
    name: M5 A/A calibration
    runs-on: [self-hosted, macOS, stwo-judge]
    timeout-minutes: 75
    steps:
      - name: Checkout exact source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require the designated host and offline Metal tools
        run: |
          set -euo pipefail
          test "$(system_profiler SPHardwareDataType -json | python3 -c 'import json,sys; print(json.load(sys.stdin)["SPHardwareDataType"][0]["chip_type"])')" = "Apple M5 Max"
          test "$(sysctl -n hw.logicalcpu)" = "18"
          xcrun --sdk macosx --find metal
          xcrun --sdk macosx --find metallib
          test -z "$(git status --porcelain)"

      - name: Build the governed products
        run: |
          zig build native-proof-bench-metal -Doptimize=ReleaseFast
          zig build metal-core-aot -Doptimize=ReleaseSafe

      - name: Reproduce the authenticated AOT bundle
        run: >-
          python3 scripts/metal_core_aot_receipt.py reproduce
          --builder zig-out/bin/metal-core-aot
          --output-dir "$RUNNER_TEMP/metal-aot"

      - name: Measure every manifest Metal class sequentially
        run: >-
          autoresearch/cli/stwo-perf calibrate-metal measure
          --aot-bundle "$RUNNER_TEMP/metal-aot/build-a"
          --out-dir "$RUNNER_TEMP/metal-calibration"

      - name: Validate the freezeable report
        run: >-
          autoresearch/cli/stwo-perf calibrate-metal validate
          --report "$RUNNER_TEMP/metal-calibration/calibration.json"

      - name: Retain immutable calibration evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: metal-calibration-${{ github.sha }}-${{ github.run_id }}
          path: ${{ runner.temp }}/metal-calibration
          if-no-files-found: error
          retention-days: 30
